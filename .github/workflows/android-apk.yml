name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Create google-services.json
      - name: Create google-services.json
        run: |
          mkdir -p android/app/src/dev
          echo '${{ secrets.GOOGLE_SERVICES_JSON_DEV }}' > android/app/src/dev/google-services.json

      # 4. Create debug keystore
      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      # 5. Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 6. Build APK (Debug)
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 7. Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          # This pattern will find the apk regardless of the specific flavor folder
          path: android/app/build/outputs/apk/**/*.apk
